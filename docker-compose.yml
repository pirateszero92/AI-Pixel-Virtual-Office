version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: ai_office_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: ai_company_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ai_office_redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_office_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:supersecretpassword@postgres:5432/ai_company_db
      - REDIS_HOST=redis
      - AI_PROVIDER_URL=http://host.docker.internal:1234/v1
    depends_on:
      - postgres
      - redis
    restart: always
    volumes:
      - ./backend/agent_workspace:/app/agent_workspace

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_office_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
